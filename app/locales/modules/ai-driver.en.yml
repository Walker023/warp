ai_driver:
  errors:
    internal: "An internal error occurred. Please try running your task again. If the issue persists, contact support."
    terminal_session_start_failed: "Terminal session failed to start: %{error}"
    share_session:
      internal: "Failed to share agent session due to an internal error. Please try running your task again."
      failed: "Failed to share agent session: %{reason}"
      disabled: "Session sharing is not enabled for your account. This is likely because an administrator has disabled session sharing for your team. Please verify that session sharing is enabled in your team settings, or try running without the --share flag."
      timeout: "Failed to share agent session: timed out waiting for the session sharing server to respond. Please check your network connection and try again."
      interrupted: "Session sharing was interrupted before it could complete. Please try running your task again."
    warp_drive_sync_failed: "Warp Drive failed to sync. Please check your network connection and try again."
    authentication_required: "Authentication required. Log in via '%{bin} login', provide an API key via '--api-key', or set the WARP_API_KEY environment variable."
    cloud_access_configuration_failed: "Error configuring cloud access: %{error}"
    mcp_server_not_found: "MCP server %{uuid} was not found. Verify the server exists in your Warp Drive and the UUID is correct."
    managed_mcp_resolution_failed: "Managed MCP server %{uid} could not be resolved: %{message}"
    mcp_startup_failed: "One or more MCP servers failed to start:\n\n%{server_lines}\n\nCheck that each server's configuration is valid and that it is reachable from the agent's environment."
    mcp_json_parse_failed: "Failed to parse MCP server JSON configuration: %{message}"
    mcp_missing_variables: "MCP server configuration is missing required variables. Provide all required environment variables or template values."
    profile_not_found: "Agent profile \"%{name}\" not found. Check the profile ID and ensure it exists in your team's Warp Drive."
    saved_prompt_not_found: "Saved prompt not found for ID %{id}. Verify the prompt exists in your Warp Drive."
    environment_not_found: "Environment '%{id}' not found. Verify the environment ID and ensure it exists in your team settings."
    environment_setup_failed: "Environment setup failed: %{message}. Check your repository URLs and setup commands."
    invalid_working_directory: "Working directory '%{path}' does not exist or is not a directory. Verify the path in your environment configuration."
    team_metadata_refresh_timeout: "Timed out refreshing team metadata. Please check your network connection and try again."
    skill_resolution_failed: "Skill resolution failed: %{message}"
    config_build_failed: "Failed to build agent configuration: %{error}"
    prompt_resolution_failed: "Failed to resolve prompt for the run: %{error}"
    secrets_fetch_failed: "Failed to fetch task secrets: %{error}"
    aws_bedrock_credentials_failed: "Failed to initialize AWS Bedrock credentials: %{message}"
    conversation_load_failed: "Failed to load conversation: %{message}"
    conversation_harness_mismatch: "Conversation %{conversation_id} was produced by the %{expected} harness, but --harness %{got} was requested. Re-run with --harness %{expected} (or omit --harness) to continue this conversation."
    task_harness_mismatch: "Task %{task_id} was created with the %{expected} harness, but --harness %{got} was requested. Re-run with --harness %{expected} (or omit --harness) to continue this task."
    conversation_resume_state_missing: "Conversation %{conversation_id} has no stored transcript for the %{harness} harness. The prior run may have crashed before saving any state."
    harness_command_failed: "Harness command exited with code %{exit_code}"
    harness_setup_failed: "Harness '%{harness}' validation failed: %{reason}"
    harness_config_setup_failed: "Harness '%{harness}' config setup failed: %{error}"
    harness_auth_check_failed: "Harness '%{harness}' authentication check failed: login credentials are invalid or expired. Verify that the authentication secret configured for this harness is correct."
    harness_runtime_failure_detected: "Harness '%{harness}' could not make a successful API request. Matched failure pattern '%{pattern}' in harness output: \"%{excerpt}\". This usually means the API key is invalid, out of credits, or the account is misconfigured."
  status:
    task_cancelled: "Task cancelled."
    conversation_blocked: "The agent got stuck waiting for user confirmation on the action: %{action}"
  warnings:
    mcp_startup_degraded: "Warning: some MCP servers were unavailable during startup (%{details}); continuing without their tools."
    slow_bootstrap: "Warning: Terminal session is slow to bootstrap. See https://docs.warp.dev/support-and-community/troubleshooting-and-support/known-issues#shells to troubleshoot."
