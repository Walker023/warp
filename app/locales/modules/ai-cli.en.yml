      not_found: "Environment %{id} not found"
      no_warp_dev_images: "No Warp dev images available."
      select_image: "Error selecting image"
      enter_custom_image: "Error entering custom image"
      max_auth_attempts: "Exceeded maximum number of authorization attempts (%{count}). Please try again later."
      private_repo_inaccessible: "Cannot access private repo %{owner}/%{repo}"
