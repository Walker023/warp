      github_auth_expired: "GitHub authorization expired. Please try again."
      oauth_non_terminal_status: "Unexpected non-terminal OAuth status returned"
      oauth_poll: "Error polling OAuth status: %{error}"
      oauth_url_missing: "Server error: did not receive auth URL for OAuth flow"
      operation_auth_flow_missing: "Cannot %{operation} environment: authorization required but no auth flow provided by server"
      check_github_auth: "Failed to check GitHub auth status"
      confirmation_prompt: "Error prompting for confirmation: %{error}"
      integration_usage_unknown: "Aborting environment %{operation} because integration usage could not be determined. Re-run with --force to override."
      update_failed: "Failed to update environment"
      delete_failed: "Failed to delete environment"
