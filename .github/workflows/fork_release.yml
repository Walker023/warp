name: Fork Release (macOS and Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.2026.07.10.1
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: true
        type: boolean
      draft:
        description: Create the GitHub Release as a draft
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: fork-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: never
  CARGO_BUILD_JOBS: 2
  GIT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  WARP_CARGO_PROFILE: release-fork

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        shell: bash
        env:
          RELEASE_TAG: ${{ env.GIT_RELEASE_TAG }}
        run: |
          if ! git check-ref-format "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Invalid Git tag: $RELEASE_TAG"
            exit 1
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9A-Za-z_-]+)+$ ]]; then
            echo "::error::Release tag must look like v0.2026.07.10.1"
            exit 1
          fi

  build_macos_arch:
    name: Build macOS binary (${{ matrix.arch }})
    needs: validate
    runs-on: macos-26
    timeout-minutes: 360
    env:
      # Use the standard runner's available CPU capacity without oversubscribing it.
      CARGO_BUILD_JOBS: 3
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare build environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        run: ./script/install_cargo_bundle

      - name: Install Rust target
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build unsigned macOS package
        id: bundle
        shell: bash
        run: |
          set -o pipefail
          ./script/bundle --channel oss --nosign --release-tag "$GIT_RELEASE_TAG" --arch "${{ matrix.arch }}" --dmg-name-suffix "${{ matrix.arch }}" 2>&1 | tee "macos-${{ matrix.arch }}-build.log"

      - name: Report macOS architecture build failure
        if: ${{ failure() }}
        shell: bash
        run: |
          tail -n 10 "macos-${{ matrix.arch }}-build.log" \
            | while IFS= read -r line; do
                echo "::error title=macOS ${{ matrix.arch }} build log::$line"
              done

      - name: Upload macOS architecture failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-${{ matrix.arch }}-failure-log
          path: macos-${{ matrix.arch }}-build.log
          if-no-files-found: ignore

      - name: Upload macOS artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fork-release-macos-${{ matrix.arch }}
          path: ${{ steps.bundle.outputs.dmg_path }}
          if-no-files-found: error

  build_windows:
    name: Build Windows installer (${{ matrix.arch }})
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare build environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          cache_key: fork-release-${{ matrix.arch }}
          is_self_hosted: false
          install_release_deps: true

      - name: Install Rust target
        if: ${{ matrix.arch == 'arm64' }}
        shell: bash
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build unsigned installer
        id: bundle
        shell: pwsh
        run: |
          try {
            ./script/windows/bundle.ps1 `
              -CHANNEL oss `
              -RELEASE_TAG "$env:GIT_RELEASE_TAG" `
              -ARCH "${{ matrix.arch }}" *>&1 `
              | Tee-Object -FilePath windows-build.log

            if (-not $?) {
              exit 1
            }
          } catch {
            $_ | Out-String | Tee-Object -FilePath windows-build.log -Append
            exit 1
          }

      - name: Report Windows build failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          Get-Content windows-build.log `
            | Select-Object -Last 10 `
            | ForEach-Object {
                $Line = $_.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
                Write-Output "::error title=Windows ${{ matrix.arch }} build log::$Line"
              }

      - name: Upload Windows failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fork-release-windows-${{ matrix.arch }}-failure-log
          path: windows-build.log
          if-no-files-found: ignore

      - name: Upload Windows artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fork-release-windows-${{ matrix.arch }}
          path: ${{ steps.bundle.outputs.installer_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build_macos_arch
      - build_windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: fork-release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-assets
        shell: bash
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ env.GIT_RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Warp 中文版 ${{ env.GIT_RELEASE_TAG }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'push' || inputs.prerelease }}
          generate_release_notes: true
          body: |
            本版本包含此 fork 的简体中文本地化改动，首次启动默认显示简体中文，并保留英文切换选项。

            下载文件：
            - `WarpOss-aarch64.dmg`：Apple Silicon Mac 安装包。
            - `WarpOss-x86_64.dmg`：Intel Mac 安装包。
            - `WarpOssSetup.exe`：Windows x64 安装程序。
            - `WarpOssSetup-arm64.exe`：Windows ARM64 安装程序。
            - `SHA256SUMS.txt`：全部安装包的 SHA-256 校验值。

            这些社区构建未使用 Warp 官方证书签名或公证。macOS Gatekeeper 和 Windows SmartScreen 可能在安装时显示安全警告。
          files: release-assets/*
          fail_on_unmatched_files: true
